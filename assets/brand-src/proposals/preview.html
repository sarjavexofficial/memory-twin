<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Memory Twin アイコン案比較</title>
<style>
  body { background:#1a1d27; color:#e8eaf2; font-family:"Segoe UI",sans-serif; margin:24px; }
  .grid { display:flex; gap:24px; flex-wrap:wrap; }
  .card { text-align:center; }
  .card img.big { width:180px; height:180px; border-radius:40px; display:block; }
  .card img.small { width:48px; height:48px; border-radius:11px; margin-top:10px; }
  .name { margin-top:10px; font-size:14px; font-weight:600; }
</style>
</head>
<body>
<div class="grid">
  <div class="card"><img class="big" src="../icon-main.svg"><br><img class="small" src="../icon-main.svg"><div class="name">現行: ツインS</div></div>
  <div class="card"><img class="big" src="icon-a-twin-orbs.svg"><br><img class="small" src="icon-a-twin-orbs.svg"><div class="name">案A: ツインオーブ</div></div>
  <div class="card"><img class="big" src="icon-b-infinity.svg"><br><img class="small" src="icon-b-infinity.svg"><div class="name">案B: 無限の記憶</div></div>
  <div class="card"><img class="big" src="icon-c-journal-spark.svg"><br><img class="small" src="icon-c-journal-spark.svg"><div class="name">案C: 記憶のノート</div></div>
  <div class="card"><img class="big" src="icon-d-twin-bubbles.svg"><br><img class="small" src="icon-d-twin-bubbles.svg"><div class="name">案D: 対話のツイン</div></div>
</div>
</body>
</html>
